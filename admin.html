<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - إدارة الأرقام</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand text-warning">TeraLink Dashboard</span>
            <button class="btn btn-danger btn-sm" onclick="localStorage.removeItem('adminToken'); window.location.href='login.html'">خروج</button>
        </div>
    </nav>

    <div class="container text-white">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="p-4 bg-dark border rounded">
                    <h4 class="text-warning mb-3">رفع أرقام جديدة عبر ملف Excel</h4>
                    <form id="uploadForm">
                        <div class="mb-3">
                            <input type="file" id="excelFile" class="form-control" accept=".xlsx, .xls" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">بدء المعالجة والتحديث التلقائي</button>
                    </form>
                    <div id="uploadStatus" class="mt-3"></div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="p-4 bg-dark border rounded">
                    <h4 class="text-warning mb-3">إضافة رقم منفرد</h4>
                    <form id="singleNumberForm">
                        <div class="row g-2">
                            <div class="col-md-6">
                                <input type="text" id="newNumber" class="form-control" placeholder="050XXXXXXX" required>
                            </div>
                            <div class="col-md-6">
                                <select id="newCategory" class="form-select" required>
                                    <option value="Platinum">Platinum</option>
                                    <option value="Gold">Gold</option>
                                    <option value="Silver">Silver</option>
                                    <option value="Bronze">Bronze</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 mt-3">حفظ الرقم في النظام</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="p-4 bg-dark border rounded mb-4">
    <h4 class="text-warning mb-3"><i class="fas fa-cloud-download-alt"></i> مزامنة البيانات السحابية</h4>
    <p class="text-secondary small">بكبسة زر واحدة، سيقوم النظام بالاتصال بملف Google Sheets المركزي، والتحقق من جودة الأرقام وسحب التحديثات الجديدة تلقائياً إلى قاعدة البيانات.</p>
    <button id="syncSheetBtn" class="btn btn-warning w-100 fw-bold py-2">
        ابدأ مزامنة وتحديث الأرقام الآن
    </button>
    <div id="syncStatus" class="mt-3 text-center"></div>
</div>

    <script src="js/admin.js"></script>
</body>
</html>
