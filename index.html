<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرقام الإمارات VIP المميزة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* كود سحري لمنع المتصفح من عكس الأرقام المجزأة بفراغات */
        .number-display, .number-box, table td {
            direction: ltr !important;
            unicode-bidi: bidi-override !important;
            display: inline-block; /* أو استخدم table-cell حسب تصميمك */
            text-align: right; /* للمحافظة على محاذاة النص لليمين داخل الكارت العربي */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#">TeraLink VIP Numbers</a>
            <a href="login.html" class="btn btn-outline-warning btn-sm">لوحة التحكم</a>
        </div>
    </nav>

    <div class="container">
        <div class="search-section p-4 mb-4">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label text-secondary">ابحث عن جزء من الرقم</label>
                    <input type="text" id="searchInput" class="form-control" placeholder="مثال: 4444 أو 78">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-secondary">التصنيف</label>
                    <select id="categorySelect" class="form-select">
                        <option value="All">كل التصنيفات</option>
                        <option value="Platinum">Platinum</option>
                        <option value="Gold">Gold</option>
                        <option value="Silver">Silver</option>
                        <option value="Bronze">Silver Plus</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label text-secondary">المقدمة</label>
                    <select id="prefixSelect" class="form-select">
                        <option value="All">الكل</option>
                        <option value="050">050</option>
                        <option value="054">054</option>
                        <option value="056">056</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label text-secondary">الترتيب حسب</label>
                    <select id="sortSelect" class="form-select">
                        <option value="latest">الأحدث أولاً</option>
                        <option value="oldest">الأقدم أولاً</option>
                        <option value="category">حسب التصنيف</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="numbersContainer" class="row g-3">
            </div>

        <nav class="mt-4">
            <ul id="paginationContainer" class="pagination justify-content-center"></ul>
        </nav>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
