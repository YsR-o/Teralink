<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول الإدارة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center style" style="height: 100vh;">
    <div class="card p-4 bg-dark text-white border-warning" style="width: 400px;">
        <h3 class="text-center text-warning mb-4">بوابة الأدمن</h3>
        <div id="loginAlert" class="alert alert-danger d-none"></div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-warning w-100">دخول</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('adminToken', data.token);
                window.location.href = 'admin.html';
            } else {
                const alert = document.getElementById('loginAlert');
                alert.textContent = data.message;
                alert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
